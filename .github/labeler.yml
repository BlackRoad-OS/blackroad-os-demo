# Label configuration for PR Labeler action

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**/*'
          - '*.md'
          - 'README*'

ci/cd:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**/*'
          - 'Dockerfile'
          - 'docker-compose*.yml'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'package-lock.json'
          - 'pnpm-lock.yaml'
          - 'yarn.lock'

config:
  - changed-files:
      - any-glob-to-any-file:
          - '*.config.*'
          - '*.json'
          - '*.yaml'
          - '*.yml'
          - '*.toml'
          - '!**/.github/**/*.yaml'
          - '!**/.github/**/*.yml'

tests:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.test.*'
          - '**/*.spec.*'
          - '__tests__/**/*'
          - 'test/**/*'
